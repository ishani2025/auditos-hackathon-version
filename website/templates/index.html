<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AuditOS - Forensic Fraud Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
    .card{border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.2);margin-bottom:20px}
    .upload-area{border:3px dashed #667eea;border-radius:10px;padding:40px;cursor:pointer;background:rgba(255,255,255,.9)}
    .image-preview{max-width:100%;max-height:300px;border-radius:10px}
    .verdict-accepted{background:linear-gradient(135deg,#56ab2f 0%,#a8e063 100%);color:#fff}
    .verdict-rejected{background:linear-gradient(135deg,#ff416c 0%,#ff4b2b 100%);color:#fff}
    .fraud-badge{padding:5px 10px;border-radius:20px;font-size:.75em}
  </style>
</head>
<body>
<div class="container">
  <div class="header card p-4 text-center mb-4">
    <h1>🔍 <strong>AuditOS</strong> Forensic Fraud Detection</h1>
    <p class="lead">Upload an image for AI-powered fraud analysis (Moiré + pHash)</p>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="card p-4">
        <h4><i class="fas fa-upload me-2"></i> Upload Image</h4>
        <div class="upload-area" id="dropArea">
          <i class="fas fa-cloud-upload-alt fa-4x text-primary mb-3"></i>
          <h5>Drag & Drop or Click</h5>
          <p class="text-muted">Images up to 16MB</p>
          <input type="file" id="fileInput" accept="image/*" class="d-none">
          <button onclick="document.getElementById('fileInput').click()" class="btn btn-primary mt-3">Choose File</button>
        </div>
        <div id="progressSection" style="display:none" class="mt-4">
          <h6>Processing...</h6>
          <div class="progress" style="height:20px"><div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div></div>
          <p id="progressText" class="text-muted mt-2">Starting...</p>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-4">
        <h4><i class="fas fa-chart-bar me-2"></i> Analysis Results</h4>
        <div id="resultsContainer">
          <div class="text-center text-muted py-5"><i class="fas fa-search fa-3x mb-3"></i><p>Upload an image to begin analysis</p></div>
        </div>
      </div>
    </div>
  </div>

  <div id="previewSection" class="card p-4 mt-4" style="display:none;">
    <h4><i class="fas fa-image me-2"></i> Preview</h4>
    <div class="row">
      <div class="col-md-4"><img id="previewImage" class="image-preview" src=""></div>
      <div class="col-md-8"><div id="detailedResults"></div></div>
    </div>
  </div>

  <div class="card p-4 mt-4">
    <h4><i class="fas fa-history me-2"></i> Recent Uploads</h4>
    <div id="recentImages" class="row"></div>
  </div>
</div>

<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const progressSection = document.getElementById('progressSection');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const previewSection = document.getElementById('previewSection');
const previewImage = document.getElementById('previewImage');
const resultsContainer = document.getElementById('resultsContainer');
const detailedResults = document.getElementById('detailedResults');
const recentImages = document.getElementById('recentImages');

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.style.borderColor='#764ba2'; });
dropArea.addEventListener('dragleave', () => { dropArea.style.borderColor='#667eea'; });
dropArea.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files.length){ fileInput.files = e.dataTransfer.files; handleUpload(); }});
fileInput.addEventListener('change', handleUpload);

async function handleUpload(){
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => { previewImage.src = e.target.result; previewSection.style.display='block'; };
  reader.readAsDataURL(file);

  progressSection.style.display='block';
  progressBar.style.width='25%';
  progressText.textContent='Uploading...';

  const form = new FormData();
  form.append('image', file);

  try{
    const resp = await fetch('/upload', { method: 'POST', body: form });
    const data = await resp.json();

    progressBar.style.width='70%';
    progressText.textContent='Running analysis...';

    displayResults(data);
    loadRecentImages();

    progressBar.style.width='100%';
    progressText.textContent='Done!';
    setTimeout(()=>{ progressSection.style.display='none'; progressBar.style.width='0%'; }, 1400);

  } catch(err){
    progressText.textContent = 'Error: ' + err.message;
    progressBar.style.width='100%';
    progressBar.classList.add('bg-danger');
  }
}

function displayResults(data){
  const verdict = data.final_verdict || {};
  const fraud = !!verdict.fraud;
  const status = verdict.accepted ? "✅ ACCEPTED – EPR CREDIT ISSUED" : (verdict.fraud ? "🚫 REJECTED – FRAUD DETECTED" : "Analysis Complete");
  const ts = data.timestamp ? new Date(data.timestamp).toLocaleString() : "Timestamp unavailable";
  const credit = verdict.credit_id || "";

  resultsContainer.innerHTML = `<div class="card ${fraud ? 'verdict-rejected' : 'verdict-accepted'} p-4 result-card">
    <h4 class="text-white"><i class="fas fa-${fraud ? 'times-circle' : 'check-circle'} me-2"></i>${status}</h4>
    <p class="text-white"><i class="fas fa-clock me-2"></i>${ts} ${credit ? ' • ID: ' + credit : ''}</p>
  </div>`;

  let html = `<h5 class="mt-4">Detailed Analysis</h5><div class="row">`;
  const checks = data.checks || {};

  for (const [name, check] of Object.entries(checks)){
    const isFraudCheck = check.fraud_detected || check.is_duplicate || false;
    const verdictLabel = check.verdict || (isFraudCheck ? 'FRAUD' : 'CLEAN');

    html += `<div class="col-md-6 mb-3">
      <div class="card h-100 ${isFraudCheck ? 'border-danger' : 'border-success'}">
        <div class="card-body">
          <h6 class="card-title">${resolveCheckName(name)} <span class="fraud-badge float-end ${isFraudCheck ? 'bg-danger' : 'bg-success'}">${verdictLabel}</span></h6>
          <p class="small">
            ${check.reason ? `Reason: ${check.reason}<br>` : ''}
            ${typeof check.score !== 'undefined' ? `Score: ${check.score}<br>` : ''}
            ${typeof check.fft_score !== 'undefined' ? `FFT: ${check.fft_score}<br>` : ''}
            ${typeof check.total_checked !== 'undefined' ? `Checked: ${check.total_checked}<br>` : ''}
            ${typeof check.closest_distance !== 'undefined' && check.closest_distance !== null ? `Closest: ${check.closest_distance} bits<br>` : ''}
            ${check.error ? `Error: ${check.error}<br>` : ''}
          </p>
        </div>
      </div>
    </div>`;
  }

  html += `</div><h6 class="mt-3">Reasons: ${(verdict.reasons || []).join(', ') || 'None'}</h6>`;
  detailedResults.innerHTML = html;
}

function resolveCheckName(name){
  if (name === 'moire_detection') return '<i class="fas fa-desktop me-2"></i> Moiré Detection';
  if (name === 'phash_duplicate') return '<i class="fas fa-fingerprint me-2"></i> pHash Similarity';
  return name;
}

async function loadRecentImages(){
  try {
    const r = await fetch('/database');
    const data = await r.json();
    const imgs = data.database || [];
    recentImages.innerHTML = imgs.slice(0,6).map(i => `
      <div class="col-md-2 col-4 mb-3"><div class="card"><img src="${i.url}" style="height:100px;object-fit:cover" class="card-img-top"><div class="p-2 small text-truncate">${i.name}<br><span class="text-muted">${(i.size/1024).toFixed(1)} KB</span></div></div></div>
    `).join('');
  } catch(e) {
    console.log('recent images error', e);
  }
}
loadRecentImages();
</script>
</body>
</html>
